<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Pedidos - Delícias da Tia Néa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans">

    <header class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Gestão de Pedidos</h1>
            <button onclick="fetchOrders()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-all">
                <i class="fa-solid fa-rotate"></i> Atualizar
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <div id="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
            <p class="mt-4 text-slate-500">Carregando pedidos da planilha...</p>
        </div>

        <div id="orders-list" class="grid gap-6">
            <!-- Pedidos serão inseridos aqui -->
        </div>

        <div id="empty-msg" class="text-center py-20 hidden">
            <i class="fa-solid fa-clipboard-list text-6xl text-slate-300 mb-4"></i>
            <p class="text-slate-500 text-lg">Nenhum pedido registrado ainda.</p>
        </div>
    </main>

    <script>
        // Use a mesma URL que você configurou no app.js
        const API_URL = "https://script.google.com/macros/s/AKfycbzuF0_e4hy31Hmb7JgQhV8rN6b74kv25HvVgCjI5alm1Aq8NvtRiJgYwyJr1WSZGWRkeQ/exec";

        async function fetchOrders() {
            const list = document.getElementById('orders-list');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty-msg');

            loading.classList.remove('hidden');
            list.innerHTML = '';
            empty.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?action=pedidos`);
                const orders = await response.json();

                if (!orders || orders.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                orders.forEach(order => {
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden";

                    // Formata a data
                    const date = new Date(order.data).toLocaleString('pt-BR');

                    card.innerHTML = `
                        <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                            <div>
                                <span class="text-[10px] font-bold uppercase text-slate-400">ID do Pedido</span>
                                <h3 class="font-bold text-indigo-600">${order.pedido_id || '#000'}</h3>
                            </div>
                            <span class="text-xs text-slate-500">${date}</span>
                        </div>
                        <div class="p-4 grid md:grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm"><strong>Cliente:</strong> ${order.cliente}</p>
                                <p class="text-sm"><strong>Telefone:</strong> ${order.telefone}</p>
                                <p class="text-sm"><strong>Entrega:</strong> ${order.tipo_entrega.toUpperCase()}</p>
                                ${order.endereco ? `<p class="text-sm text-slate-600 mt-1"><i class="fa-solid fa-location-dot"></i> ${order.endereco}</p>` : ''}
                            </div>
                            <div class="bg-indigo-50 p-3 rounded-xl">
                                <p class="text-xs font-bold text-indigo-400 uppercase mb-2">Itens do Pedido</p>
                                <p class="text-sm text-slate-700 whitespace-pre-line">${order.itens.replace(/,/g, '\n')}</p>
                                <div class="mt-3 pt-2 border-t border-indigo-100 flex justify-between items-center">
                                    <span class="font-bold">Total:</span>
                                    <span class="text-lg font-bold text-indigo-600">${order.total}</span>
                                </div>
                            </div>
                        </div>
                        ${order.observacoes ? `
                        <div class="px-4 pb-4">
                            <div class="bg-yellow-50 p-2 rounded-lg text-xs text-yellow-800">
                                <strong>Obs:</strong> ${order.observacoes}
                            </div>
                        </div>` : ''}
                        <div class="p-4 bg-slate-50 border-t flex gap-2">
                            <a href="https://wa.me/${order.telefone.replace(/\D/g, '')}" target="_blank" class="flex-1 bg-green-500 text-white text-center py-2 rounded-lg text-sm font-bold">
                                <i class="fa-brands fa-whatsapp"></i> Contatar Cliente
                            </a>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao carregar pedidos. Verifique se o Apps Script foi publicado corretamente.");
            } finally {
                loading.classList.add('hidden');
            }
        }

        // Carrega ao abrir
        document.addEventListener('DOMContentLoaded', fetchOrders);
    </script>
</body>
</html>
